version: '3.8'

services:
  app:
    build: .
    volumes:
      # Data persistente para SQLite en VPS o entorno local Dockerizado (Host to Container)
      - ./data:/usr/src/app/data
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_ALLOWED_USER_IDS=${TELEGRAM_ALLOWED_USER_IDS}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_CHAT_MODEL=${OPENAI_CHAT_MODEL:-gpt-4o-mini}
      - OPENAI_TRANSCRIPTION_MODEL=${OPENAI_TRANSCRIPTION_MODEL:-whisper-1}
      - DATABASE_URL=/usr/src/app/data/database.sqlite
    restart: always
